<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#EEF3FF"/>
      <stop offset="0.55" stop-color="#DFE9FF"/>
      <stop offset="1" stop-color="#CFddFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.16" r="0.6">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#3B82F6" opacity="0.10"/>
    </pattern>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#1B2A5E" flood-opacity="0.16"/>
    </filter>
    <filter id="softGround" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#glow)"/>
  <rect x="120" y="980" width="840" height="360" fill="url(#dots)"/>

  <!-- soft brand swoosh behind cluster -->
  <path d="M120 1020 A 440 300 0 0 0 960 1020" fill="none" stroke="#3B82F6" stroke-width="40" stroke-linecap="round" opacity="0.10"/>
  <path d="M210 1075 A 360 240 0 0 0 870 1075" fill="none" stroke="#3B82F6" stroke-width="22" stroke-linecap="round" opacity="0.16"/>

  <!-- ground shadow -->
  <ellipse cx="540" cy="1015" rx="330" ry="44" fill="#243a78" opacity="0.12" filter="url(#softGround)"/>

  <!-- floating accents -->
  <circle cx="884" cy="330" r="46" fill="none" stroke="#FFC53D" stroke-width="9" opacity="0.85"/>
  <circle cx="208" cy="900" r="17" fill="#FB5A5A" opacity="0.9"/>
  <circle cx="900" cy="760" r="11" fill="#3B82F6" opacity="0.7"/>
  <circle cx="300" cy="300" r="9" fill="#3B82F6" opacity="0.45"/>
  <circle cx="828" cy="600" r="7" fill="#FB5A5A" opacity="0.55"/>

  <!-- ===== Card A : cresting line / area chart (hero) ===== -->
  <g filter="url(#cardShadow)">
    <rect x="250" y="470" width="580" height="420" rx="28" fill="#FFFFFF"/>
  </g>
  <!-- header placeholders -->
  <rect x="290" y="516" width="186" height="18" rx="9" fill="#E7ECF5"/>
  <rect x="290" y="544" width="120" height="12" rx="6" fill="#EEF1F7"/>
  <circle cx="704" cy="526" r="7" fill="#3B82F6"/>
  <circle cx="728" cy="526" r="7" fill="#FFC53D"/>
  <circle cx="752" cy="526" r="7" fill="#FB5A5A"/>
  <!-- gridlines -->
  <line x1="290" y1="630" x2="790" y2="630" stroke="#EFF2F8" stroke-width="2"/>
  <line x1="290" y1="710" x2="790" y2="710" stroke="#EFF2F8" stroke-width="2"/>
  <line x1="290" y1="790" x2="790" y2="790" stroke="#EFF2F8" stroke-width="2"/>
  <!-- area fill -->
  <path d="M290 762 C 360 748 398 662 470 616 C 540 572 592 544 662 600 C 720 646 742 690 790 676 L790 830 L290 830 Z" fill="url(#area)"/>
  <!-- crest line -->
  <path d="M290 762 C 360 748 398 662 470 616 C 540 572 592 544 662 600 C 720 646 742 690 790 676" fill="none" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- peak marker -->
  <circle cx="618" cy="566" r="11" fill="#FFFFFF" stroke="#3B82F6" stroke-width="5"/>
  <circle cx="470" cy="616" r="7" fill="#3B82F6"/>

  <!-- ===== Card B : brand bars (logo echo) ===== -->
  <g filter="url(#cardShadow)">
    <rect x="178" y="356" width="232" height="214" rx="22" fill="#FFFFFF"/>
  </g>
  <rect x="210" y="390" width="96" height="12" rx="6" fill="#E7ECF5"/>
  <rect x="226" y="462" width="34" height="62" rx="8" fill="#FFC53D"/>
  <rect x="276" y="416" width="34" height="108" rx="8" fill="#3B82F6"/>
  <rect x="326" y="442" width="34" height="82" rx="8" fill="#FB5A5A"/>

  <!-- ===== Card C : donut ===== -->
  <g filter="url(#cardShadow)">
    <rect x="636" y="812" width="252" height="252" rx="26" fill="#FFFFFF"/>
  </g>
  <g stroke-width="30" fill="none" stroke-linecap="round">
    <path d="M771.1 875.3 A70 70 0 0 1 771.1 1014.7" stroke="#3B82F6"/>
    <path d="M758.9 1014.7 A70 70 0 0 1 696.8 929.3" stroke="#FFC53D"/>
    <path d="M700.6 917.7 A70 70 0 0 1 758.9 875.3" stroke="#FB5A5A"/>
  </g>
  <circle cx="762" cy="945" r="26" fill="#EFF3FA"/>
</svg>
